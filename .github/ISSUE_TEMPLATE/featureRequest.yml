name: 功能建议
description: 提议一个新功能或改进方向
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 说明当前遇到的限制或想改进的工作流。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你希望项目如何支持这个场景。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 已尝试的替代方式或实现思路。
