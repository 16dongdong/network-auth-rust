name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable

      - name: Format
        run: cargo fmt --check

      - name: Check
        run: cargo check -j1 --quiet

      - name: Test
        run: cargo test -j1 --lib

      - name: Open source audit
        shell: pwsh
        run: ./scripts/openSourceAudit.ps1
