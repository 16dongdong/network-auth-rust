  <h1>授权管理系统安装说明</h1>
  <p>安装脚本会创建网络验证所需数据表，并自动生成系统密钥、后台 API 管理密钥和初始后台管理员密码。</p>
  <h2>安装命令</h2>
  <p><code>php tools\scripts\install.php</code></p>
  <h2>安全要求</h2>
  <p>安装完成后请立即保存命令行输出的初始密码和管理密钥，并在首次登录后修改后台密码。配置文件、日志、缓存和会话目录不得暴露到公网可下载路径。</p>
  <h2>使用边界</h2>
  <p>本系统只提供应用授权验证、卡密、设备、会话和审计能力。旧代理、旧支付、旧模板和旧服务器管理功能已删除。</p>
</main>
